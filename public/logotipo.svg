<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo (opcional) -->
  <rect width="400" height="120" fill="#ffffff" rx="12" ry="12"/>

  <!-- Ícone hexagonal tecnológico -->
  <g transform="translate(55, 55)">
    <!-- Hexágono -->
    <polygon points="0,-35 30.3,-17.5 30.3,17.5 0,35 -30.3,17.5 -30.3,-17.5" fill="url(#grad)" stroke="none" />
    
    <!-- Linhas internas (estilo chip/circuito) -->
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#ffffff" stroke-width="3" />
    <line x1="-30.3" y1="-17.5" x2="30.3" y2="17.5" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <line x1="-30.3" y1="17.5" x2="30.3" y2="-17.5" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    
    <!-- Ponto central -->
    <circle cx="0" cy="0" r="6" fill="#ffffff" />
  </g>

  <!-- Texto NextTech -->
  <text x="110" y="72" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="url(#gradText)" letter-spacing="1">
    Next<tspan fill="url(#grad)">Tech</tspan>
  </text>

  <!-- Slogan opcional -->
  <text x="110" y="98" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748b" letter-spacing="2">
    INOVAÇÃO & TECNOLOGIA
  </text>
</svg>